{{ define "main" }}
  <header>
    <h1 class="mt-5 text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
  </header>

  {{ with .Content }}
    <section class="prose mt-1 mb-10 max-w-full dark:prose-invert">
      {{ . }}
    </section>
  {{ end }}

  {{ $pinned := partial "portfolio/resolve-pinned.html" . }}
  {{ $sections := .Sections.ByWeight | complement $pinned }}
  {{ partial "portfolio/grid.html" ($pinned | append $sections) }}
{{ end }}
